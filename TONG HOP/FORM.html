<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
        }

        .Background-Form {
            background-color: gray;
            width: 100%;
            height: auto;
            padding: 20px;
            border-radius: 8px;
        }

        .Background-Form h3 {
            color: black;
            font-size: 40px;
            font-weight: 700;
            font-variant: small-caps;
            margin-bottom: 15px;
        }

        .Form > input[type="email"],
        .Form > input[type="password"],
        .Form > input[type="text"] {
            width: 100%;
            height: 32px;
            background-color: whitesmoke;
            border: none;
            border-radius: 7px;
            padding: 20px;
            margin-top: 8px;
            font-size: 16px;
        }

        .Form > input[type="checkbox"], label[for="remember-me"], label[for="I-argee"] {
            margin-top: 16px;
            font-size: 18px;
            margin-top: 20px;
        }

        .Form > button {
            width: 100%;
            height: 40px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 17px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="Background-Form">
        <h3>Login</h3>
        <form action="" method="post" class="Form">
            <input type="email" name="Email" id="Email" placeholder="Email">
            <br>
            <input type="password" name="Password" id="Password" placeholder="Password">
            <br>
            <input type="checkbox" name="remember-me" id="remember-me" value="remember-me">
            <label for="remember-me">Remember Me</label>
            <br>
            <button type="submit">Login</button>
        </form>
    </div>
    <br>
    <div class="Background-Form">
        <h3>Register</h3>
        <form action="" method="post" class="Form">
            <input type="text" name="Full-Name" id="Full-Name" placeholder="Full Name">
            <br>
            <input type="email" name="Email" id="Email" placeholder="Email">
            <br>
            <input type="password" name="Password" id="Password" placeholder="Password">
            <br>
            <input type="checkbox" name="I-argee" id="I-argee" value="I-argee">
            <label for="I-argee"> I read & agree the terms & conditions.</label>
            <br>
            <button type="submit">Register</button>
        </form>

    </div>
</body>
</html>
