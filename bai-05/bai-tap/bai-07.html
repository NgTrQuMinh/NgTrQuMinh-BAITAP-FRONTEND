<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng thông tin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    table {
      width: 100%;
      /* border-collapse: collapse; */
      text-align: center;
      table-layout: fixed;
    }

    .t-head th {
      background-color: orange;
      border: 1px solid rgb(184, 169, 169);
      padding: 10px;
    }

    .t-body td { 
      border: 1px solid rgb(214, 196, 196); 
      padding: 10px;
    }

    .t-body tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    .t-body tr:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>
  <h1>Câu 7: Table (Bảng)</h1>  
  <p><strong>Yêu cầu</strong>: Sử dụng HTML và CSS để dựng bảng bên dưới (Dùng thẻ table, thead, tbody, tr, th, td).</p>

  <table>
    <thead class="t-head">
      <tr>
        <th>ID</th>  
        <th>Họ tên</th> 
        <th>Giới tính</th>  
        <th>Tuổi</th>
      </tr>
    </thead>
    <tbody class="t-body">
      <tr>
        <td>1</td>  
        <td>Nguyễn Văn A</td> 
        <td>Nam</td>  
        <td>20</td>
      </tr>
      <tr>
        <td>2</td>  
        <td>Trần Thị B</td> 
        <td>Nữ</td>  
        <td>21</td>
      </tr>
      <tr>
        <td>3</td>  
        <td>Lê Văn C</td> 
        <td>Nam</td>  
        <td>22</td>
      </tr>
      <tr>
        <td>4</td>  
        <td>Phạm Thị D</td> 
        <td>Nữ</td>  
        <td>23</td>
      </tr>
      <tr>
        <td>5</td>  
        <td>Hoàng Văn E</td> 
        <td>Nam</td>  
        <td>24</td>
      </tr>
      <tr>
        <td>6</td>  
        <td>Đỗ Thị F</td> 
        <td>Nữ</td>  
        <td>25</td>
      </tr>
      <tr>
        <td>7</td>  
        <td>Vũ Văn G</td> 
        <td>Nam</td>  
        <td>26</td>
      </tr>
      <tr>
        <td>8</td>  
        <td>Phan Thị H</td> 
        <td>Nữ</td>  
        <td>27</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
