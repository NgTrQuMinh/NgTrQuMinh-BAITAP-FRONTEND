<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀI 12</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        * {
            box-sizing: border-box;
            font-family: "Be Vietnam Pro", sans-serif;
        }

        .background {
            background-image: url(../img/12.png);  
            background-size: cover;
            width: 100%;
            height: 350px;
            padding-top: 125px;
            text-align: center;
        }

        .box { 
            display: inline-block;
            padding: 0px 50px;
            color: white;
            border-right: 1px solid white;
        }

        .box > h2:first-child {
            font-size: 48px;
            text-transform: uppercase;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .box p {
            font-weight: 500;
            text-transform: uppercase;
            margin-bottom: 0px;
        }
        
        .none-boder {
            border-right: none;
        }

    </style>
</head>

<body>
    <h1>Câu 12: Counter (Các chỉ số)</h1>
    <p><strong>Yêu cầu</strong>: Sử dụng HTML và CSS để dựng khối bên dưới (Dùng kiểu hiển thị inline-block, dùng font Be Vietnam Pro).</p>

    <div class="background">
        <div class="box">
            <h2>500+</h2>
            <p>Learners & counting</p>
        </div>
        <div class="box">
            <h2>800+</h2>
            <p>Courses & Video</p>
        </div>
        <div class="box">
            <h2>1,000+</h2>
            <p>Certified Students</p>
        </div>
        <div class="box none-boder">
            <h2>100+</h2>
            <p>Certified Students</p>
        </div>
    </div>
</body>

</html>
