<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀI 6</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        * {
            box-sizing: border-box;
        }

        table {
            width: 100%;
            height: 300px;
            border-spacing: 5px;
            border-collapse: collapse;
        }

        .t-head th {
            background-color: #96D5FE;
            padding: 20px;
            border: 2px solid rgb(255, 255, 255);
            text-align: center;
            font-size: 20px;
        }

        .t-body td {
            border-bottom: 1px solid rgb(0, 0, 0);
            text-align: center;
        }
    </style>

</head>

<body>
    <h1>Câu 6: Table (Bảng)</h1>
    <p><strong>Yêu cầu</strong>: Sử dụng HTML và CSS để dựng bảng bên dưới (Dùng thẻ table, thead, tbody, tr, th, td).</p>

    <table>
        <thead class="t-head">
            <tr>
                <th>ID</th>
                <th>Họ tên</th>
                <th>Giới tính</th>
                <th>Tuổi</th>
            </tr>
        </thead>
        <tbody class="t-body">
            <tr>
                <td>1</td>
                <td>Lê Văn A</td>
                <td>Nam</td>
                <td>18</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Lê Thị B</td>
                <td>Nữ</td>
                <td>22</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Lê Văn C</td>
                <td>Nam</td>
                <td>26</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
