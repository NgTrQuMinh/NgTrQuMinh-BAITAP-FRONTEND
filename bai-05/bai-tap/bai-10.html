<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀI 10</title>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            text-decoration: none;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #fff;
        }

        .background {
            width: 100%;
            height: auto;
            padding: 50px 0;
            background-color: #F9F9FF;
            text-align: center;
        }

        .background > h2 {
            color: #1E1E1E;
            font-size: 50px;
        }

        .block-all {
            display: inline-block;
            width: 250px;
            height: auto;
            padding-top: 30px;
            border: 1px solid black;
            border-radius: 15px;
            background-color: #ffffff;
            margin: 10px 15px;
        }

        .block-all img {
            width: 80px;
            height: auto;
            object-fit: cover;
        }

        .block-all h3 {
            font-size: 20px;
            font-weight: 600;
            color: #000;
        }

        .block-all p {
            font-size: 16px;
            color: #000;
        }

        .block-all:hover {
            background-color: #CFE8FF;
        }
    </style>

</head>

<body>
    <h1>Câu 10: Category (Danh sách danh mục)</h1>

    <p><strong>Yêu cầu</strong>: Sử dụng HTML và CSS để dựng khối bên dưới (inline-block, font Be Vietnam Pro).</p>

    <div class="background">
        <h2>Danh sách danh mục</h2>
            <div class="container block-all">
                <a href="#">
                    <img src="https://frontend.daca.vn/lessons/lesson-4-5/images/web-design.png" alt="web-design">
                    <h3>Web Design</h3>
                    <p>25 sản phẩm <i class="fa-solid fa-arrow-right"></i></p>
                </a>
            </div>

            <div class="container block-all">
                <a href="#">
                    <img src="https://frontend.daca.vn/lessons/lesson-4-5/images/design.png" alt="design">
                    <h3>Graphic Design</h3>
                    <p>20 sản phẩm <i class="fa-solid fa-arrow-right"></i></p>
                </a>
            </div>

            <div class="container block-all">
                <a href="#">
                    <img src="https://frontend.daca.vn/lessons/lesson-4-5/images/personal.png" alt="IT-and-software">
                    <h3>IT and Software</h3>
                    <p>28 sản phẩm <i class="fa-solid fa-arrow-right"></i></p>
                </a>
            </div>

            <div class="container block-all">
                <a href="#">
                    <img src="https://frontend.daca.vn/lessons/lesson-4-5/images/server.png" alt="personal">
                    <h3>Development Design</h3>
                    <p>30 sản phẩm <i class="fa-solid fa-arrow-right"></i></p>
                </a>
            </div>
    </div>

</body>

</html>
