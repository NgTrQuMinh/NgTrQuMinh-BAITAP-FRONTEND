<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀI 3</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        .button-circle {
            width: 100px;
            height: 100px;
            border: 1px solid rgb(198, 182, 182);
            border-radius: 50%;
            align-items: center;
            cursor: pointer;
            transition: 0.25s;
        }

        .button-circle i {
            font-size: 20px;
        }

        .button-circle:hover {
            background-color: rgb(80, 32, 255);
        }
    </style>
</head>

<body>
    <h1>Câu 3: Socials (Mạng xã hội)</h1>
    <p><strong>Yêu cầu</strong>: Sử dụng HTML và CSS để dựng các nút mạng xã hội bên dưới (Dùng thẻ button).</p>

    <div>
        <button class="button-circle">
            <i class="fa-brands fa-facebook-f"></i>
        </button>

        <button class="button-circle">
            <i class="fa-brands fa-x-twitter"></i>
        </button>
        <button class="button-circle">
            <i class="fa-brands fa-instagram"></i>
        </button>
        <button class="button-circle">
            <i class="fa-brands fa-tiktok"></i>
        </button>
    </div>
</body>

</html>
