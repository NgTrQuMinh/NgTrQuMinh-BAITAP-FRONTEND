<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀI 13</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        * {
            box-sizing: border-box;
            font-family: "Be Vietnam Pro", sans-serif;
        }
        .form {
            background-color: rgb(255, 255, 255);
            border: 1px solid #f3f3f3;
            width: 550px;
            border-radius: 10px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .form > h2 {
            font-size: 24px;
            font-weight: bold;
        }

        .form input {
            display: block;
            width: 100%;
            height: 60px;
            background-color: #e7e7e7;
            border: 0px;
            padding: 0px 20px;
            border-radius: 8px;
            margin: 20px 0px;
        }
                
        .form input[type="checkbox"] {
            width: auto;
            height: auto;
            display: inline-block;
            vertical-align: middle; /* checkbox không bị lệch */
            margin: 0;
        }


        .form button {
            width: 100%;
            height: 60px;
            background-color: rgb(138, 138, 255);
            border: 0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-top: 20px;
        }

    </style>
</head>

<body>
    <h1>Câu 13: Counter (Các chỉ số)</h1>
    <p><strong>Yêu cầu</strong>: Sử dụng HTML và CSS để dựng khối bên dưới (Dùng font Be Vietnam Pro).</p>

    <div class="form">
        <h2>Login</h2>
        <form action="https://www.w3schools.com/action_page.php">
            <input type="text" name="email"  placeholder="Email">
            <input type="password" name="password" placeholder="Password"><br>
            <input type="checkbox" name="remember_me" id="rememberMe">
            <label for="rememberMe">Remember Me</label>
            <button type="submit">Login</button>
        </form>
    </div>

    <div class="form">
        <h2>Register</h2>
        <form action="https://www.w3schools.com/action_page.php">
            <input type="text" name="full_name" placeholder="Full Name">
            <input type="text" name="email" placeholder="Email">
            <input type="password" name="password" placeholder="Password">
            <input type="checkbox" name="agree" id="agree" >
            <label for="agree">I read & agree the terms & conditions.</label>
            <button type="submit">Register</button>
        </form>
    </div>

</body>

</html>
