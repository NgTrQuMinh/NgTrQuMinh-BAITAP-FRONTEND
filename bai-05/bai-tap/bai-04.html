<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀI 4</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        .button-size {
            background-color: rgb(243, 243, 243);
            border: 1px solid rgb(230, 229, 229);
            border-radius: 8px;
            width: 50px;
            height: 50px;
            font-size: 15px;
            color: gray;
        }

        .active {
            background-color: rgb(79, 63, 255);
            color: white;
        }

        .button-size:hover {
            background-color: rgb(106, 80, 255);
            cursor: pointer;
        }

    </style>
</head>

<body>
    <h1>Câu 4: Pagination (Phân trang)</h1>
    <p><strong>Yêu cầu</strong>: Sử dụng HTML và CSS để dựng khối phân trang bên dưới (Dùng thẻ button).</p>

    <button class="button-size">
        <i class="fa-solid fa-angle-left"></i>
    </button>
    <button class="button-size">
        1
    </button>
    <button class="button-size">
        2
    </button>
    <button class="button-size active">
        3
    </button>
    <button class="button-size">
        4
    </button>
    <button class="button-size">
        5
    </button>
    <button class="button-size">
        <i class="fa-solid fa-angle-right"></i>
    </button>

</body>

</html>
