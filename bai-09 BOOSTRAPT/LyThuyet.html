<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* REASET */
        html, body, div, span, applet, object, iframe,
        h1, h2, h3, h4, h5, h6, p, blockquote, pre,
        a, abbr, acronym, address, big, cite, code,
        del, dfn, em, img, ins, kbd, q, s, samp,
        small, strike, strong, sub, sup, tt, var,
        b, u, i, center,
        dl, dt, dd, ol, ul, li,
        fieldset, form, label, legend,
        table, caption, tbody, tfoot, thead, tr, th, td,
        article, aside, canvas, details, embed, 
        figure, figcaption, footer, header, hgroup, 
        menu, nav, output, ruby, section, summary,
        time, mark, audio, video {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font: inherit;
            vertical-align: baseline;
        }
        article, aside, details, figcaption, figure, 
        footer, header, hgroup, menu, nav, section {
            display: block;
        }
        body {
            line-height: 1;
        }
        ol, ul {
            list-style: none;
        }
        blockquote, q {
            quotes: none;
        }
        blockquote:before, blockquote:after,
        q:before, q:after {
            content: '';
            content: none;
        }
        table {
            border-collapse: collapse;
            border-spacing: 0;
        }
        /* REASET */
        * {
            box-sizing: border-box;
        }

        .section-one {
            background-color: aliceblue;
            padding: 80px 0px;
        }

        .section-one .row {
            justify-self: center;
            align-items: center;
        }

        .section-one .row .inner-title h3 {
            font-size: 60px;
            margin-bottom: 50px;
        }

        .section-one .row .inner-title p { 
            color: #5B6C9E;
            font-size: 24px;
        }

        .section-one .row .inner-title .button {
            display: flex;
            width: 150px;
            height: 50px;
            background-color: rgb(251, 251, 104);
            border: 1px solid rgb(255, 255, 206);
            border-radius: 99px;
            text-align: center;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
        }

        .section-one .row .inner-title .button a {
            font-size: 18px;
            color: #fff;
            text-decoration: none;
        }

        .section-one .row .inner-img img {
            width: 100%;
            height: auto;
        }

    </style>

</head>
<body>
    <div class="section-one">
        <div class="container">
            <div class="row">
                <div class="col-xl-6">
                    <div class="inner-title">
                        <h3>Effective & <br>reliable <br>protection</h3>
                        <p>Lorem ipsum dolor sit amet, consectetur<br>adipiscing elit.</p>
                        <div class="button">
                            <a href="#">About</a>
                        </div>
                    </div>
                </div>
                <div class="col-xl-6">
                    <div class="inner-img">
                        <img src="http://127.0.0.1:5500/bai-08/NgTrQuMinh-Project1/assets/images/features1.png" alt="img">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
